[build]
  command = "if [ ! -d \"flutter\" ]; then git clone https://github.com/flutter/flutter.git -b stable; fi && export PATH=\"$PATH:$(pwd)/flutter/bin\" && flutter pub get && flutter build web --release --no-tree-shake-icons"
  publish = "build/web"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
